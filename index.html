<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://vite.dev/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue-tailwind-theme-kit Playground</title>
    <!-- Anti-FOUC script -->
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('ui-theme') || 'theme';
          const savedDark = localStorage.getItem('ui-dark-mode');
          const isDark = savedDark !== null ? savedDark === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground transition-colors duration-200">
    <div id="app"></div>
    <script type="module" src="/playground/main.ts"></script>
  </body>
</html>
